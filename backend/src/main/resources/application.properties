spring.config.import=optional:file:.env[.properties]

# Server
server.port=${PORT:8080}

# Datasource
spring.datasource.url=${DB_URL:jdbc:h2:mem:swifteats_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_ACCESS_EXPIRATION:${JWT_EXPIRATION:1800000}}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
app.jwt.prefix=Bearer

# Password reset
app.reset-password.expiration-ms=${RESET_PASSWORD_EXPIRATION_MS:900000}
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:3000/reset-password}
app.reset-password.expose-link=${RESET_PASSWORD_EXPOSE_LINK:false}
app.token-cleanup.fixed-delay-ms=${TOKEN_CLEANUP_FIXED_DELAY_MS:3600000}

# Rate limiting
app.rate-limit.auth.window-seconds=${RATE_LIMIT_AUTH_WINDOW_SECONDS:60}
app.rate-limit.auth.max-requests=${RATE_LIMIT_AUTH_MAX_REQUESTS:10}
app.rate-limit.forgot-password.window-seconds=${RATE_LIMIT_FORGOT_PASSWORD_WINDOW_SECONDS:900}
app.rate-limit.forgot-password.max-requests=${RATE_LIMIT_FORGOT_PASSWORD_MAX_REQUESTS:3}
app.rate-limit.refresh.window-seconds=${RATE_LIMIT_REFRESH_WINDOW_SECONDS:300}
app.rate-limit.refresh.max-requests=${RATE_LIMIT_REFRESH_MAX_REQUESTS:20}

# Mail
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:no-reply@swifteats.local}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Seeder
app.seeder.enabled=${SEEDER_ENABLED:true}

# Geocoding
app.geocoding.enabled=${GEOCODING_ENABLED:true}
app.geocoding.base-url=${GEOCODING_BASE_URL:https://nominatim.openstreetmap.org}
app.geocoding.user-agent=${GEOCODING_USER_AGENT:SwiftEats/1.0 (contact: admin@swifteats.local)}

# Logging
logging.level.com.swifteats=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# H2 console
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=SwiftEats
info.app.version=2.0.0

# Jackson
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.serialization.write-dates-as-timestamps=false
