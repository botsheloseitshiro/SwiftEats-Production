spring:
  datasource:
    url: jdbc:h2:mem:swifteats_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: false
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false

logging:
  level:
    com.swifteats: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

app:
  seeder:
    enabled: false
  reset-password:
    expose-link: false
  geocoding:
    enabled: false
